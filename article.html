<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Sleepy Hallow Media — Article</title>
  <!-- Canonical filled at runtime -->
  <link id="canonical" rel="canonical" href="">

  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=5.1" />

  <!-- OG/Twitter with safe defaults; JS overwrites -->
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Sleepy Hallow Media" />
  <meta property="og:title" id="og-title" content="Sleepy Hallow Media — Article" />
  <meta property="og:description" id="og-description" content="" />
  <meta property="og:image" id="og-image" content="assets/social-default.jpg" />
  <meta property="og:url" id="og-url" content="" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="tw-title" content="Sleepy Hallow Media — Article" />
  <meta name="twitter:description" id="tw-description" content="" />
  <meta name="twitter:image" id="tw-image" content="assets/social-default.jpg" />

  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script defer src="script.js?v=5.1"></script>

  <!-- AdSense loader (added) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9198552366209337"
          crossorigin="anonymous"></script>

  <!-- Minimal styles to place left/right ad rails -->
  <style>
    /* Layout: ad rails + content */
    .article-wrap {
      display: grid;
      grid-template-columns: 1fr min(740px, 100%) 1fr; /* left rail | content | right rail */
      gap: 16px;
      align-items: start;
    }
    .ad-rail {
      position: sticky;
      top: 16px; /* keep visible while scrolling */
      height: max-content;
    }
    .ad-rail .ad-slot {
      display: block;
      width: 100%;
      min-height: 250px; /* prevents jumpy layout before fill */
      background: transparent;
    }
    /* Rail widths (tweak as needed) */
    .ad-left, .ad-right {
      width: 300px; /* typical sidebar width for 300x250/300x600 */
      justify-self: center;
    }

    /* Keep existing article-body centered in the middle column */
    .article-body {
      max-width: 740px;
      margin: 0 auto;
      width: 100%;
    }

    /* Hide rails on smaller viewports */
    @media (max-width: 1200px) {
      .article-wrap {
        grid-template-columns: minmax(0, 1fr);
      }
      .ad-left, .ad-right {
        display: none;
      }
    }
  </style>
</head>
<body data-page="article">
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="topbar" aria-label="Site tools">
    <div class="wrap topbar-row">
      <div class="topbar-left">
        <a class="top-link" href="newsletters.html">Latest</a>
        <a class="top-link" href="newsletters.html?tag=Local">Local</a>
        <a class="top-link" href="newsletters.html?tag=Opinion">Opinion</a>
      </div>
      <form id="site-search" class="top-search" action="newsletters.html" method="get">
        <label for="q" class="sr-only"></label>
        <input id="q" name="q" type="search" placeholder="Search…" autocomplete="off" />
        <button class="btn" type="submit" aria-label="Search">Search</button>
      </form>
    </div>
  </div>

  <header class="site-header" role="banner">
    <div class="wrap header-row">
      <a class="brand" href="index.html">
        <img class="brand-mark" src="assets/logo.png" alt="" />
        <span class="brand-name">Sleepy Hallow Media</span>
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <a data-nav="home" href="index.html">Home</a>
        <a data-nav="newsletters" href="newsletters.html">Newsletters</a>
      </nav>
      <div class="header-tools">
        <button id="theme-toggle" class="theme-toggle" type="button"
                aria-label="Toggle dark mode" aria-pressed="false">
          <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="mobile-menu">☰</button>
      </div>
    </div>
    <nav id="mobile-menu" class="mobile-menu" aria-label="Mobile">
      <a data-nav="home" href="index.html">Home</a>
      <a data-nav="newsletters" href="newsletters.html">Newsletters</a>
    </nav>
  </header>

  <!-- Article hero -->
  <section id="article-hero" class="a-hero" aria-label="Article header">
    <img class="a-hero-bg" alt="" loading="eager" decoding="async" />
    <div class="wrap a-hero-inner">
      <div id="article-category" class="a-kicker" hidden></div>
      <h1 id="article-title" class="a-title"></h1>
      <p id="article-subtitle" class="a-sub"></p>
      <div class="a-byline">
        <span id="article-meta"></span>
        <span id="article-reading-time" class="reading-time"></span>
      </div>
      <!-- Tag chips will append here (JS) -->
    </div>
  </section>

  <main class="wrap article-wrap" id="main" tabindex="-1">
    <!-- LEFT AD RAIL -->
    <aside class="ad-rail ad-left" aria-label="Advertisement left">
      <!-- Example 300x600 / responsive -->
      <ins class="adsbygoogle ad-slot"
           style="display:block"
           data-ad-client="ca-pub-9198552366209337"
           data-ad-slot="REPLACE_WITH_LEFT_SLOT_ID"
           data-ad-format="auto"
           data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </aside>

    <!-- ARTICLE CONTENT -->
    <article id="article-content" class="article-body" aria-busy="true">
      <p class="muted">Loading article…</p>
    </article>

    <!-- RIGHT AD RAIL -->
    <aside class="ad-rail ad-right" aria-label="Advertisement right">
      <!-- Example 300x250 / responsive -->
      <ins class="adsbygoogle ad-slot"
           style="display:block"
           data-ad-client="ca-pub-9198552366209337"
           data-ad-slot="REPLACE_WITH_RIGHT_SLOT_ID"
           data-ad-format="auto"
           data-full-width-responsive="false"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </aside>

    <aside class="share-bar" aria-label="Share this article">
      <button class="share-btn" data-share="copy">Copy Link</button>
      <a class="share-btn" data-share="email" target="_blank" rel="noopener">Email</a>
      <a class="share-btn" data-share="reddit" target="_blank" rel="noopener">Reddit</a>
      <a class="share-btn" data-share="x" target="_blank" rel="noopener">X</a>
      <span id="share-feedback" class="share-feedback" role="status" aria-live="polite"></span>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-grid">
      <div>
        <a class="brand" href="index.html">
          <img class="brand-mark" src="assets/logo.png" alt="" />
          <span class="brand-name">Sleepy Hallow Media</span>
        </a>
        <p class="muted">Independent reporting from the Hollow.</p>
      </div>
      <nav class="footer-links" aria-label="Footer">
        <a href="newsletters.html">Check Out Our Patreon!</a>
        <img class="Patreon" src="assets/Patreon.png" alt="" width="32" height="16"/>
      </nav>
      <div class="copy muted">© <span id="year"></span> Sleepy Hallow Media</div>
    </div>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
